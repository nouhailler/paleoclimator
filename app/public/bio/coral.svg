<svg xmlns="http://www.w3.org/2000/svg" width="240" height="160" viewBox="0 0 240 160">
  <defs>
    <linearGradient id="co-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#a9e0e6"/><stop offset="1" stop-color="#4f97a8"/></linearGradient>
    <linearGradient id="co-stag" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e88a6a"/><stop offset="1" stop-color="#c25a52"/></linearGradient>
  </defs>
  <rect width="240" height="160" fill="url(#co-bg)"/>
  <!-- rayons de lumière -->
  <g opacity="0.16" fill="#ffffff"><polygon points="54,0 74,0 60,160 44,160"/><polygon points="150,0 166,0 168,160 146,160"/><polygon points="196,0 206,0 214,160 200,160"/></g>
  <!-- fond récifal sableux -->
  <path d="M0,138 Q120,124 240,140 L240,160 L0,160 Z" fill="#ecdcb4"/>
  <path d="M0,146 Q120,136 240,148 L240,160 L0,160 Z" fill="#e0cc9e"/>

  <!-- gorgone (éventail de mer) à gauche -->
  <g transform="translate(38,142)" stroke="#8a5fb0" fill="none" stroke-linecap="round">
    <path d="M0,0 C-4,-24 -16,-34 -22,-52 M0,0 C0,-26 2,-40 2,-58 M0,0 C4,-24 16,-34 22,-52" stroke-width="4"/>
    <path d="M-14,-30 q-8,-6 -14,-14 M-4,-40 q-10,-4 -18,-10 M4,-40 q10,-4 18,-10 M14,-30 q8,-6 14,-14 M0,-46 q0,-8 0,-16" stroke-width="2.5"/>
  </g>

  <!-- corail cerveau (dôme rainuré) à droite -->
  <g transform="translate(198,132)">
    <ellipse cx="0" cy="0" rx="34" ry="24" fill="#d9a35a"/>
    <ellipse cx="0" cy="0" rx="34" ry="24" fill="none" stroke="#b07f3c" stroke-width="2"/>
    <g stroke="#a8763a" stroke-width="2" fill="none" opacity="0.85"><path d="M-28,-6 q10,-8 22,-2 q10,6 22,-2 M-28,4 q10,6 22,0 q10,-6 22,0 M-20,-14 q8,4 16,-2 M-14,12 q10,-4 20,2"/></g>
  </g>

  <!-- colonie branchue (staghorn) au centre -->
  <g stroke="url(#co-stag)" fill="none" stroke-linecap="round">
    <path d="M118,146 V88" stroke-width="15"/>
    <path d="M118,120 q-22,-6 -34,-30 M118,110 q24,-4 40,-26 M118,128 q-30,0 -46,14 M118,124 q32,2 50,16 M118,98 q-14,-14 -14,-34 M118,96 q16,-12 20,-30" stroke-width="10"/>
    <path d="M84,90 q-8,-14 -4,-28 M158,84 q10,-12 8,-28 M72,142 q-16,-4 -24,-16 M168,140 q16,-4 24,-16 M104,64 q-4,-12 2,-22 M138,66 q6,-10 4,-22" stroke-width="7"/>
  </g>
  <!-- pointes polypes clairs -->
  <g fill="#f6c8b0"><circle cx="80" cy="60" r="5"/><circle cx="166" cy="54" r="5"/><circle cx="104" cy="40" r="5"/><circle cx="140" cy="42" r="5"/><circle cx="48" cy="124" r="4"/><circle cx="192" cy="122" r="4"/><circle cx="118" cy="86" r="5"/></g>
  <g fill="#c25a52"><circle cx="80" cy="60" r="1.8"/><circle cx="166" cy="54" r="1.8"/><circle cx="104" cy="40" r="1.8"/><circle cx="140" cy="42" r="1.8"/><circle cx="118" cy="86" r="1.8"/></g>

  <!-- petit poisson récifal -->
  <g transform="translate(56,68)">
    <path d="M0,0 Q10,-8 24,-6 Q34,-5 40,0 Q34,5 24,6 Q10,8 0,0 Z" fill="#f2c14e"/>
    <path d="M0,0 Q-8,-6 -12,-4 Q-8,0 -12,4 Q-8,6 0,0 Z" fill="#f2c14e"/>
    <path d="M18,-5 V5" stroke="#d99a2c" stroke-width="2"/>
    <circle cx="32" cy="-1" r="2" fill="#3a2c10"/>
  </g>
</svg>

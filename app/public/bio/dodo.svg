<svg xmlns="http://www.w3.org/2000/svg" width="240" height="160" viewBox="0 0 240 160">
  <defs><linearGradient id="do-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef0d8"/><stop offset="1" stop-color="#d3d6a8"/></linearGradient></defs>
  <rect width="240" height="160" fill="url(#do-bg)"/>
  <path d="M0,134 Q120,124 240,134 L240,160 L0,160 Z" fill="#8aa15a"/>

    <ellipse cx="52" cy="-40" rx="16" ry="14" fill="#a89a5c"/>
    <circle cx="56" cy="-42" r="3" fill="#2f2812"/>
    <!-- bec crochu -->
    <path d="M64,-40 Q84,-38 82,-26 Q76,-24 68,-30 Q66,-36 64,-40 Z" fill="#6d5a2f"/>
    <!-- pattes -->
    <g stroke="#8a6a3a" stroke-width="4" stroke-linecap="round"><path d="M-12,52 V70 M14,52 V70"/></g>
    <g stroke="#8a6a3a" stroke-width="2.5" stroke-linecap="round"><path d="M-12,70 l-7,5 M-12,70 l0,7 M-12,70 l7,5 M14,70 l-7,5 M14,70 l0,7 M14,70 l7,5"/></g>

<svg xmlns="http://www.w3.org/2000/svg" width="240" height="160" viewBox="0 0 240 160">
  <defs>
    <linearGradient id="mt-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#efe2c0"/><stop offset="1" stop-color="#d3c390"/></linearGradient>
    <linearGradient id="mt-body" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#b08a4e"/><stop offset="1" stop-color="#8a6a38"/></linearGradient>
  </defs>
  <rect width="240" height="160" fill="url(#mt-bg)"/>
  <circle cx="46" cy="40" r="18" fill="#f6ecc4" opacity="0.6"/>
  <path d="M0,140 Q120,130 240,140 L240,160 L0,160 Z" fill="#a89164"/>
  <g opacity="0.4" fill="#977f52"><ellipse cx="150" cy="150" rx="60" ry="6"/></g>

  <!-- branche feuillue (cible du brout) -->
  <g stroke="#7d5a34" stroke-width="5" stroke-linecap="round" fill="none"><path d="M228,10 Q196,20 176,40"/></g>
  <g fill="#6f9a4e"><ellipse cx="182" cy="36" rx="10" ry="5" transform="rotate(-30 182 36)"/><ellipse cx="196" cy="28" rx="10" ry="5" transform="rotate(-30 196 28)"/><ellipse cx="210" cy="22" rx="10" ry="5" transform="rotate(-30 210 22)"/><ellipse cx="188" cy="48" rx="9" ry="4.5" transform="rotate(-20 188 48)"/></g>

  <g>
    <!-- queue épaisse (appui tripode) -->
    <path d="M70,116 Q40,128 42,152 Q58,150 70,142 Q84,130 92,120 Z" fill="#8a6a38"/>
    <!-- patte arrière / hanche massive -->
    <ellipse cx="96" cy="120" rx="42" ry="34" fill="url(#mt-body)"/>
    <!-- pied arrière + griffes -->
    <path d="M104,146 Q140,150 150,142 Q140,138 122,138 Q110,138 104,146 Z" fill="#7d6236"/>
    <g fill="#efe6d6"><path d="M148,140 q10,0 14,-4 q-6,-3 -12,-1 Z"/><path d="M136,142 q10,1 14,-3 q-6,-3 -12,-1 Z"/></g>

    <!-- torse dressé, incliné en arrière -->
    <path d="M74,124 Q60,84 82,58 Q98,38 124,42 Q140,46 140,66 Q140,92 122,106 Q104,120 96,126 Q84,130 74,124 Z" fill="url(#mt-body)"/>

    <!-- épaule + bras tendu vers la branche -->
    <path d="M120,58 Q150,46 172,42" stroke="#9a7a44" stroke-width="17" fill="none" stroke-linecap="round"/>
    <!-- grandes griffes -->
    <g fill="#efe6d6" stroke="#c9bda0" stroke-width="0.8"><path d="M170,36 q12,-2 18,4 q-8,4 -16,2 Z"/><path d="M172,44 q12,0 17,7 q-9,3 -16,-1 Z"/><path d="M170,52 q11,2 15,9 q-9,2 -15,-3 Z"/></g>

    <!-- cou + tête relevée -->
    <path d="M104,52 Q108,30 96,16 Q112,10 124,22 Q132,32 128,46 Q120,56 104,52 Z" fill="url(#mt-body)"/>
    <ellipse cx="104" cy="20" rx="15" ry="13" fill="#a5824a"/>
    <!-- museau -->
    <path d="M92,18 Q78,18 74,26 Q80,30 90,26 Z" fill="#8a6a38"/>
    <circle cx="98" cy="16" r="2.6" fill="#3a2a12"/>
    <!-- oreille -->
    <path d="M112,10 l4,-9 l6,7 Z" fill="#8a6a38"/>

    <!-- fourrure (traits) -->
    <g stroke="#6d5228" stroke-width="1.5" opacity="0.45" fill="none"><path d="M76,96 l-9,6 M74,80 l-9,5 M76,64 l-9,4 M62,120 l-10,4 M64,136 l-10,3 M132,72 l8,4 M130,58 l9,3"/></g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="240" height="160" viewBox="0 0 240 160">
  <defs>
    <linearGradient id="wd-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e0d3bd"/><stop offset="1" stop-color="#bfa984"/></linearGradient>
    <radialGradient id="wd-ring" cx="0.46" cy="0.44" r="0.6"><stop offset="0" stop-color="#b56a4a"/><stop offset="0.5" stop-color="#8a4f38"/><stop offset="1" stop-color="#6d3f2c"/></radialGradient>
  </defs>
  <rect width="240" height="160" fill="url(#wd-bg)"/>
  <!-- rondelle de bois pétrifié : cernes concentriques -->
  <g transform="translate(120,80)">
    <ellipse cx="0" cy="0" rx="74" ry="62" fill="url(#wd-ring)"/>
    <g fill="none" stroke="#c98a5a" stroke-opacity="0.75">
      <ellipse cx="-2" cy="0" rx="64" ry="53" stroke-width="2"/>
      <ellipse cx="-4" cy="1" rx="52" ry="43" stroke-width="2.5"/>
      <ellipse cx="-5" cy="1" rx="40" ry="33" stroke-width="2"/>
      <ellipse cx="-6" cy="2" rx="28" ry="23" stroke-width="2.5"/>
      <ellipse cx="-6" cy="2" rx="16" ry="13" stroke-width="2"/>
      <ellipse cx="-6" cy="2" rx="7" ry="6" stroke-width="2"/>
    </g>
    <!-- fissures radiales (minéralisées, agatisées) -->
    <g stroke="#4a2f22" stroke-width="1.6" opacity="0.7"><path d="M-6,2 L-52,-34 M-6,2 L44,-30 M-6,2 L52,26 M-6,2 L-8,58 M-6,2 L-58,20"/></g>
    <ellipse cx="0" cy="0" rx="74" ry="62" fill="none" stroke="#5c3d2c" stroke-width="3"/>
    <!-- éclats de quartz -->
    <g fill="#e7c9a0" opacity="0.5"><circle cx="30" cy="-14" r="3"/><circle cx="-34" cy="10" r="2.5"/><circle cx="12" cy="34" r="2.5"/></g>
  </g>
</svg>

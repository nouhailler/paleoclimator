<svg xmlns="http://www.w3.org/2000/svg" width="320" height="160" viewBox="0 0 320 160">
  <defs>
    <linearGradient id="c-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe0e4"/><stop offset="1" stop-color="#eaf5f2"/>
    </linearGradient>
    <linearGradient id="c-grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c9d99a"/><stop offset="1" stop-color="#a9c479"/>
    </linearGradient>
  </defs>
  <rect width="320" height="160" fill="url(#c-sky)"/>
  <circle cx="252" cy="40" r="20" fill="#fbfef8" opacity="0.85"/>
  <!-- montagnes, sommets légèrement enneigés -->
  <polygon points="-10,100 70,44 160,100" fill="#8fb0a6"/>
  <polygon points="70,44 84,60 100,48 160,100 70,100" fill="#b9d2c8" opacity="0.7"/>
  <polygon points="46,52 70,44 94,52 82,60 60,60" fill="#eef6f4"/>
  <polygon points="140,100 230,50 320,100" fill="#7ea295"/>
  <polygon points="206,58 230,50 254,58 242,66 220,66" fill="#eef6f4"/>
  <!-- prairie -->
  <rect y="96" width="320" height="64" fill="url(#c-grass)"/>
  <path d="M0,104 Q90,96 170,104 T320,104 L320,160 L0,160 Z" fill="#b8cf86" opacity="0.6"/>
  <!-- conifères -->
  <g>
    <g transform="translate(48,104)"><polygon points="0,-30 10,0 -10,0" fill="#4f7d53"/><polygon points="0,-20 12,6 -12,6" fill="#5f8c60"/><rect x="-2" y="6" width="4" height="8" fill="#6d5a44"/></g>
    <g transform="translate(96,110)"><polygon points="0,-24 8,0 -8,0" fill="#4f7d53"/><polygon points="0,-16 10,5 -10,5" fill="#5f8c60"/><rect x="-2" y="5" width="4" height="7" fill="#6d5a44"/></g>
    <g transform="translate(268,116)"><polygon points="0,-26 9,0 -9,0" fill="#4f7d53"/><polygon points="0,-17 11,5 -11,5" fill="#5f8c60"/><rect x="-2" y="5" width="4" height="8" fill="#6d5a44"/></g>
  </g>
  <!-- herbivore simple (silhouette) -->
  <g fill="#7a6a4f" transform="translate(150,128)">
    <ellipse cx="0" cy="0" rx="20" ry="10"/>
    <path d="M16,-6 q8,-2 8,-12 q-3,-1 -6,3 q-3,-9 -6,0 Z"/>
    <rect x="-14" y="8" width="4" height="12" rx="1.5"/>
    <rect x="-4" y="8" width="4" height="12" rx="1.5"/>
    <rect x="10" y="8" width="4" height="12" rx="1.5"/>
  </g>
</svg>

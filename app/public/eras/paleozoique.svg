<svg xmlns="http://www.w3.org/2000/svg" width="320" height="160" viewBox="0 0 320 160">
  <defs>
    <linearGradient id="p-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9d3a6"/><stop offset="1" stop-color="#e7ddb4"/>
    </linearGradient>
    <linearGradient id="p-swamp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5f7a4a"/><stop offset="1" stop-color="#3e5a37"/>
    </linearGradient>
  </defs>
  <rect width="320" height="160" fill="url(#p-sky)"/>
  <circle cx="250" cy="42" r="20" fill="#fbf6dc" opacity="0.7"/>
  <!-- brume -->
  <ellipse cx="120" cy="70" rx="90" ry="14" fill="#eee7c6" opacity="0.5"/>
  <!-- marécage carbonifère -->
  <path d="M0,110 Q90,98 180,110 T320,108 L320,160 L0,160 Z" fill="url(#p-swamp)"/>
  <rect y="132" width="320" height="28" fill="#2f4a34" opacity="0.7"/>
  <!-- lycopodes (arbres écailleux) -->
  <g>
    <g transform="translate(60,110)"><rect x="-5" y="-70" width="10" height="70" rx="3" fill="#6d5a3f"/><circle cx="0" cy="-74" r="14" fill="#5a8046"/><path d="M-14,-74 q-10,-6 -18,-2 M14,-74 q10,-6 18,-2 M0,-88 q-4,-10 -10,-14 M0,-88 q4,-10 10,-14" stroke="#5a8046" stroke-width="3" fill="none" stroke-linecap="round"/></g>
    <g transform="translate(250,112)"><rect x="-4" y="-58" width="9" height="58" rx="3" fill="#6d5a3f"/><circle cx="0" cy="-62" r="12" fill="#5a8046"/><path d="M-12,-62 q-9,-5 -16,-1 M12,-62 q9,-5 16,-1" stroke="#5a8046" stroke-width="3" fill="none" stroke-linecap="round"/></g>
  </g>
  <!-- fougères de sous-bois -->
  <g stroke="#4f7040" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M150,150 q-3,-18 -12,-26"/><path d="M150,150 q0,-22 3,-32"/><path d="M150,150 q4,-16 15,-24"/>
  </g>
  <!-- libellule géante (Meganeura) -->
  <g transform="translate(200,60)" fill="#3a4a63">
    <rect x="-1.5" y="-1.5" width="26" height="3" rx="1.5"/>
    <ellipse cx="6" cy="0" rx="9" ry="3" fill="#5a6f92" opacity="0.85" transform="rotate(-18 6 0)"/>
    <ellipse cx="6" cy="0" rx="9" ry="3" fill="#5a6f92" opacity="0.85" transform="rotate(18 6 0)"/>
    <ellipse cx="16" cy="0" rx="8" ry="2.6" fill="#5a6f92" opacity="0.85" transform="rotate(-16 16 0)"/>
    <ellipse cx="16" cy="0" rx="8" ry="2.6" fill="#5a6f92" opacity="0.85" transform="rotate(16 16 0)"/>
  </g>
</svg>
